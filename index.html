<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Viral</title>

<style>
body {
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
    text-align:center;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* container full layar */
.container {
    width:100%;
    max-width:500px;
}

/* video */
.video-box {
    position:relative;
    cursor:pointer;
}

video {
    width:100%;
    border-radius:12px;
}

/* tombol play */
.play-btn {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:60px;
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:50%;
}

/* tombol lanjut */
.btn {
    margin-top:15px;
    padding:15px;
    width:100%;
    background:red;
    color:#fff;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    display:none;
}
</style>
</head>

<body>

<div class="container">

<h3>🔥 video yg lagi viral 🔥</h3>

<div class="video-box" onclick="startVideo()">
    <video id="myVideo">
        <source src="video3.mp4" type="video/mp4">
    </video>
    <div class="play-btn" id="playBtn">▶</div>
</div>

<a href="#" class="btn" id="btnNext" onclick="nextAd()">LANJUT NONTON</a>

</div>

<script>
let firstClick = false;

function startVideo() {
    let video = document.getElementById("myVideo");
    let playBtn = document.getElementById("playBtn");

    if (!firstClick) {
        window.open("https://violentlinedexploit.com/bxb4h7sx?key=66f57fe6d3cfea6168654dd48084bfe5", "_blank");
        firstClick = true;
    }

    video.play();
    playBtn.style.display = "none";

    // munculin tombol setelah 5 detik
    setTimeout(() => {
        document.getElementById("btnNext").style.display = "block";
    }, 5000);
}

function nextAd() {
    window.open("https://violentlinedexploit.com/bxb4h7sx?key=66f57fe6d3cfea6168654dd48084bfe5", "_blank");
}
</script>

</body>
      </html>
